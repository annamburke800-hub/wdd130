<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Favorite Devotionals</title>
  <link rel="stylesheet" href="styles/styles.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-image">
        <h1>My Favorite<br>Devotionals</h1>
      </div>
    </header>
    <main>
      <div class="content-box">
        <!-- Add your devotional content here -->


         <table class="blueTable">
          <thead>
            <tr>
              <th>SPEAKER</th>
              <th>TITLE</th>
              <th>LOCATION</th>
              <th>YEAR</th>
            </tr>
          </thead>
          <tbody>
          <tr>
            <!-- There is a specific reason I chose these devotionals. -->
             <!-- see if you can guess why! :D -->
          <td>Sister Heidi Egan</td><td>"Hearts Knit Together In Song"</td><td>BYU-Idaho</td><td>2025</td></tr>
          <tr>
          <td>Elder Karl D. Hirst</td><td>"Repentance at its Fullest"</td><td>BYU-Idaho</td><td>2025</td></tr>
          <tr>
          <td>Sister Jane Clayson Johnson</td><td>"Silent Souls Weeping—Finding Help and Hope in Mental Illness"</td><td>BYU-Idaho</td><td>2025</td></tr>
          </tbody>
          </tr>
          </table>

        <form>
          <label for="speaker">Speaker:</label>
          <input type="text" id="speaker"><br>

          <label for="title">Title:</label>
          <input type="text" id="title"><br>
          
          <label for="location">Location:</label>
          <input type="text" id="location"><br>

          <select name="Years" id="years">
            <option value=" ">Select year</option>
            <option value="2026">2026</option>
            <option value="2025">2025</option>
            <option value="2024">2024</option>
            <option value="2023">2023</option>
            <option value="2022">2022</option>
            <option value="2021">2021</option>
            <option value="2020">2020</option>
            <option value="2019">2019</option>
            <option value="2018">2018</option>
            <option value="2017">2017</option>
            <option value="2016">2016</option>
            <option value="2015">2015</option>
            <option value="2014">2014</option>
            <option value="2013">2013</option>
            <option value="2012">2012</option>
            <option value="2011">2011</option>
            <option value="2010">2010</option>
            <option value="2009">2009</option>
            <option value="2008">2008</option>
            <option value="2007">2007</option>
            <option value="2006">2006</option>
            <option value="2005">2005</option>
            <option value="2004">2004</option>
            <option value="2003">2003</option>
            <option value="2002">2002</option>
            <option value="2001">2001</option>
            <option value="2000">2000</option>
          
          </select>

          <input type="submit" id="submit">
        </form>
      </div>
    </main>
  </div>
</body>
</html>
